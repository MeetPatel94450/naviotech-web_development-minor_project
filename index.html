<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth System</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 800px;
      background: #fff;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .left {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
    }

    .right {
      padding: 40px;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #667eea;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #5a67d8;
    }

    .toggle {
      margin-top: 10px;
      text-align: center;
      cursor: pointer;
      color: #667eea;
    }

    .hidden {
      display: none;
    }

    #userEmail {
  background: #f1f3ff;
  padding: 8px;
  border-radius: 6px;
  color: #333;
}
  </style>
</head>
<body>

<div class="container">
  <div class="left">
    <h1>Welcome</h1>
    <p>Basic Authentication System</p>
  </div>

  <div class="right">
    <div id="loginForm">
      <h2>Login</h2>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button onclick="login()">Login</button>
      <div class="toggle" onclick="showSignup()">Don't have an account? Sign Up</div>
    </div>

    <div id="signupForm" class="hidden">
      <h2>Sign Up</h2>
      <input type="email" id="signupEmail" placeholder="Email">
      <input type="password" id="signupPassword" placeholder="Password">
      <button onclick="signup()">Sign Up</button>
      <div class="toggle" onclick="showLogin()">Already have an account? Login</div>
    </div>

    <div id="dashboard" class="hidden">
      <h2>Dashboard</h2>
      <p>You are logged in!</p>
      <p id="userEmail" style="margin:10px 0; font-weight:500;"></p>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<script>
async function signup() {
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;

  const res = await fetch('http://localhost:5000/api/auth/signup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  alert(data.message);
}

async function login() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  const res = await fetch('http://localhost:5000/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem('token', data.token);

    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

    loadUser();
  } else {
    alert(data.message);
  }
}

async function loadUser() {
  const token = localStorage.getItem('token');

  const res = await fetch('http://localhost:5000/api/user', {
    headers: {
      'Authorization': 'Bearer ' + token
    }
  });

  const data = await res.json();

  document.getElementById('userEmail').innerText =
    data.email ? "👤 " + data.email : "User not found";
}

function logout() {
  localStorage.clear();
  location.reload();
}

function showSignup() {
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('signupForm').classList.remove('hidden');
}

function showLogin() {
  document.getElementById('signupForm').classList.add('hidden');
  document.getElementById('loginForm').classList.remove('hidden');
}

window.onload = function () {
  const token = localStorage.getItem('token');

  if (token) {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

    loadUser();
  }
};
</script>
</body>
</html>
